aid: blizzard-entertainment
url: https://raw.githubusercontent.com/api-evangelist/blizzard-entertainment/refs/heads/main/apis.yml
name: Blizzard Entertainment
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Games
  - Entertainment
  - Video Games
  - Game Data
  - Battle.net
description: >-
  Blizzard Entertainment is an American video game developer and publisher and a
  subsidiary of Activision Blizzard. Blizzard exposes a Battle.net Developer
  Portal that provides public OAuth 2.0 protected APIs returning game data and
  player profile data for its major franchises including World of Warcraft,
  Diablo III, StarCraft II, and Hearthstone.
created: '2026-05-05'
modified: '2026-05-16'
specificationVersion: '0.19'
apis:
  - aid: blizzard-entertainment:world-of-warcraft-api
    name: World of Warcraft Game Data API
    description: >-
      Battle.net Game Data API for World of Warcraft providing access to
      achievements, auctions, characters, guilds, items, mounts, pets, PvP
      seasons, realms, regions, and other core game data resources for both the
      retail and classic clients. Endpoints follow the Battle.net regional host
      pattern (e.g. https://us.api.blizzard.com) and require an OAuth 2.0 client
      credentials access token. Namespaces (static, dynamic, profile) are passed
      as query parameters to select the data set.
    humanURL: https://develop.battle.net/documentation/world-of-warcraft
    baseURL: https://us.api.blizzard.com
    tags:
      - World of Warcraft
      - Game Data
      - Profile
      - Auctions
      - Characters
    properties:
      - type: Documentation
        url: https://develop.battle.net/documentation/world-of-warcraft/game-data-apis
      - type: Authentication
        url: https://develop.battle.net/documentation/guides/using-oauth
      - type: OpenAPI
        url: openapi/blizzard-world-of-warcraft-openapi.yml
  - aid: blizzard-entertainment:diablo-iii-api
    name: Diablo III Community API
    description: >-
      Battle.net Community and Game Data API for Diablo III providing access to
      acts, artisans, recipes, followers, character classes, items, item types,
      and player career/hero profile data. Like other Battle.net APIs, endpoints
      use regional hosts and require an OAuth 2.0 client credentials access
      token.
    humanURL: https://develop.battle.net/documentation/diablo-3
    baseURL: https://us.api.blizzard.com
    tags:
      - Diablo III
      - Game Data
      - Profile
      - Items
    properties:
      - type: Documentation
        url: https://develop.battle.net/documentation/diablo-3/community-apis
      - type: Authentication
        url: https://develop.battle.net/documentation/guides/using-oauth
      - type: OpenAPI
        url: openapi/blizzard-diablo-iii-openapi.yml
  - aid: blizzard-entertainment:starcraft-ii-api
    name: StarCraft II Community API
    description: >-
      Battle.net Community API for StarCraft II providing access to ladder data,
      player profiles, legacy profiles, and grandmaster leaderboards. Requires
      an OAuth 2.0 client credentials access token issued by
      https://oauth.battle.net.
    humanURL: https://develop.battle.net/documentation/starcraft-2
    baseURL: https://us.api.blizzard.com
    tags:
      - StarCraft II
      - Game Data
      - Profile
      - Ladder
    properties:
      - type: Documentation
        url: https://develop.battle.net/documentation/starcraft-2/community-apis
      - type: Authentication
        url: https://develop.battle.net/documentation/guides/using-oauth
      - type: OpenAPI
        url: openapi/blizzard-starcraft-ii-openapi.yml
  - aid: blizzard-entertainment:hearthstone-api
    name: Hearthstone Game Data API
    description: >-
      Battle.net Game Data API for Hearthstone providing access to card sets,
      individual cards, card backs, card decks (deck codes), and metadata such
      as classes, sets, rarities, types, and game modes. Card and metadata
      lookups support locale-aware responses. Requires an OAuth 2.0 client
      credentials access token.
    humanURL: https://develop.battle.net/documentation/hearthstone
    baseURL: https://us.api.blizzard.com
    tags:
      - Hearthstone
      - Game Data
      - Cards
      - Decks
    properties:
      - type: Documentation
        url: https://develop.battle.net/documentation/hearthstone/game-data-apis
      - type: Authentication
        url: https://develop.battle.net/documentation/guides/using-oauth
      - type: OpenAPI
        url: openapi/blizzard-hearthstone-openapi.yml
  - aid: blizzard-entertainment:oauth-api
    name: Battle.net OAuth API
    description: >-
      OAuth 2.0 authorization server for the Battle.net developer platform.
      Supports the authorization code flow for user-context access (Battle.net
      account login and profile scopes such as wow.profile, sc2.profile,
      d3.profile, openid) and the client credentials flow for accessing the
      public Game Data APIs. Hosted at https://oauth.battle.net.
    humanURL: https://develop.battle.net/documentation/guides/using-oauth
    baseURL: https://oauth.battle.net
    tags:
      - OAuth
      - Authentication
      - Authorization
      - OpenID Connect
    properties:
      - type: Documentation
        url: https://develop.battle.net/documentation/guides/using-oauth
      - type: OpenAPI
        url: openapi/blizzard-oauth-openapi.yml
