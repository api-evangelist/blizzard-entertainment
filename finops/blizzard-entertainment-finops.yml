specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Blizzard Entertainment
providerId: blizzard-entertainment
publisherName: Blizzard Entertainment
serviceCategory: API
created: '2026-05-16'
modified: '2026-05-16'
reconciled: false
tags:
  - Games
  - Battle.net
  - Game Data
  - FinOps
  - FOCUS
description: >-
  FinOps framework definition for the Battle.net Developer API surface.
  Battle.net Game Data and Community APIs are offered at no charge to
  developers under the Battle.net Developer API Terms of Use, so the primary
  cost lever for consumers is engineering effort and infrastructure to honor
  the per-second and per-hour limits, not invoiced API cost.
principles:
  - name: Visibility
    description: Make API call volume per Battle.net client visible to engineering and product.
  - name: Allocation
    description: Tag every Battle.net request with consuming feature, environment, region, and game so cost (effort, infrastructure, partner risk) can be allocated.
  - name: Optimization
    description: Cache static-namespace data, debounce profile lookups, and batch metadata fetches to stay well within Battle.net's per-second and per-hour ceilings.
  - name: Accountability
    description: Designate an owner for each Battle.net client id and review usage and 429 rates monthly.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
billingModel:
  pricingCategory: No-Charge
  billingFrequency: None
  billingCurrency: USD
  chargeCategories:
    - Usage
  chargeFrequency: None
focusColumns:
  ServiceName: Battle.net Developer API
  ServiceCategory: Developer Tools / API
  ProviderName: Blizzard Entertainment
  PublisherName: Blizzard Entertainment
  InvoiceIssuerName: Blizzard Entertainment
  PricingCategory: No-Charge
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of Battle.net API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - region
      - game
      - client_id
  - name: throttled_requests
    description: Count of 429 / throttled responses
    unit: request
    aggregation: sum
    dimensions:
      - api
      - region
      - client_id
  - name: oauth_token_issuance
    description: Count of OAuth token issuance calls
    unit: request
    aggregation: sum
    dimensions:
      - client_id
      - grant_type
apis:
  - name: World of Warcraft Game Data API
    baseURL: https://us.api.blizzard.com
