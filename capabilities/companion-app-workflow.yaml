naftiko: 1.0.0-alpha2
info:
  label: Battle.net Companion App Workflow
  description: >-
    End-to-end Battle.net companion app workflow. Issues an OAuth 2.0
    authorization-code-flow login, exchanges the resulting code for an access
    token, fetches the authenticated Battle.net user info, and then retrieves
    the player's World of Warcraft character profile summary.
  tags:
    - Games
    - Battle.net
    - World of Warcraft
    - OAuth
    - Companion Apps
  created: '2026-05-16'
  modified: '2026-05-16'
binds:
  - namespace: env
    keys:
      BLIZZARD_CLIENT_ID: BLIZZARD_CLIENT_ID
      BLIZZARD_CLIENT_SECRET: BLIZZARD_CLIENT_SECRET
      BLIZZARD_REDIRECT_URI: BLIZZARD_REDIRECT_URI
      BLIZZARD_REGION: BLIZZARD_REGION
capability:
  consumes:
    - type: http
      namespace: blizzard-oauth
      baseUri: https://oauth.battle.net
      description: Battle.net OAuth 2.0 authorization server
      authentication:
        type: oauth2
        clientId: '{{BLIZZARD_CLIENT_ID}}'
        clientSecret: '{{BLIZZARD_CLIENT_SECRET}}'
      resources:
        - name: token
          path: /token
          description: OAuth 2.0 token endpoint
          operations:
            - name: create-token
              method: POST
              description: Exchange an authorization code for an access token
              outputRawFormat: json
              outputParameters:
                - name: accessToken
                  type: string
                  value: $.access_token
        - name: userinfo
          path: /oauth/userinfo
          description: OpenID Connect userinfo endpoint
          operations:
            - name: get-user-info
              method: GET
              description: Get the authenticated user's battletag and sub
              outputRawFormat: json
              outputParameters:
                - name: battletag
                  type: string
                  value: $.battletag
                - name: sub
                  type: string
                  value: $.sub
    - type: http
      namespace: blizzard-wow
      baseUri: https://us.api.blizzard.com
      description: World of Warcraft Game Data API
      authentication:
        type: bearer
        token: '{{access_token}}'
      resources:
        - name: character-profile
          path: /profile/wow/character/{realmSlug}/{characterName}
          description: Player character profile summary
          operations:
            - name: get-character-profile-summary
              method: GET
              description: Get a character profile summary
              inputParameters:
                - name: realmSlug
                  in: path
                  type: string
                  required: true
                - name: characterName
                  in: path
                  type: string
                  required: true
                - name: namespace
                  in: query
                  type: string
                  required: true
                  description: Profile namespace, e.g. profile-us
                - name: locale
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: name
                  type: string
                  value: $.name
                - name: level
                  type: integer
                  value: $.level
                - name: faction
                  type: string
                  value: $.faction.name
